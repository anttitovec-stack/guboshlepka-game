name: Build APK (python3.11)
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container: kivy/python-for-android:python3.11
    steps:
      - uses: actions/checkout@v4
      - name: Build APK
        run: echo "y" | buildozer -v android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Guboshlepka-APK
          path: bin/*.apk
