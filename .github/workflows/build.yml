name: Build APK Manually
on: [push, pull_request]
jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool libffi-dev libssl-dev zlib1g-dev cmake

      - name: Install Buildozer
        run: |
          pip install --upgrade buildozer

      - name: Setup Android SDK Licenses
        run: |
          mkdir -p $HOME/.android
          echo "y" | sdkmanager --sdk_root=$HOME/.android --licenses

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Guboshlepka-APK
          path: bin/*.apk
