name: Build Kivy APK

on:
workflow_dispatch:
push:
branches:
- main
- master

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout repository
    uses: actions/checkout@v4
  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'
  - name: Cache buildozer and gradle
    uses: actions/cache@v4
    with:
      path: |
        ~/.buildozer
        ~/.gradle/caches
        ~/.gradle/wrapper
      key: buildozer-${{ runner.os }}-${{ hashFiles('Guboshlepka/buildozer.spec') }}
      restore-keys: |
        buildozer-${{ runner.os }}-
  - name: Install system dependencies
    run: |
      sudo apt update
      sudo apt install -y \
        git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config \
        zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev \
        build-essential ccache libltdl-dev libsqlite3-dev libbz2-dev
  - name: Install Python dependencies
    run: |
      python -m pip install --upgrade pip
      pip install cython buildozer
  - name: Build APK
    run: |
      cd Guboshlepka
      buildozer android debug
  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: guboshlepka-apk
      path: Guboshlepka/bin/*.apk
      if-no-files-found: error
